<body>

  <!-- Header -->
  <header class="site-header">
    <a class="logo" href="/">Anatomical Consulting</a>
    <nav>
      <a href="/">Services</a>
      <a href="/about.html">About</a>
      <a href="/contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <section class="page-header">
      <h1>General Inquiries</h1>
    </section>

    <div class="contact-content">
      <div class="contact-inner">
        <form id="contact-form">
          <input type="hidden" name="access_key" value="527dfb06-a227-4e8e-8635-8c230abfee40" />
          <input type="hidden" name="subject" value="New inquiry from Anatomical Consulting website" />
          <input type="checkbox" name="botcheck" style="display:none;" />
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your full name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@organization.com" required />
          </div>
          <div class="form-group">
            <label for="org">Organization</label>
            <input type="text" id="org" name="organization" placeholder="Company or institution" />
          </div>
          <div class="form-group">
            <label for="interest">Area of Interest</label>
            <select id="interest" name="area_of_interest">
              <option value="" disabled selected>Select a service</option>
              <option value="Cadaver-Based Procedural Courses">Cadaver-Based Procedural Courses</option>
              <option value="eLearning and Content Development">eLearning and Content Development</option>
              <option value="Curriculum Review and SME Auditing">Curriculum Review and SME Auditing</option>
              <option value="Live Workshops and Sales Meetings">Live Workshops and Sales Meetings</option>
              <option value="Consulting Retainer and Advisory">Consulting Retainer and Advisory</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Tell us about your project or goals" required></textarea>
          </div>
          <button type="submit" class="submit-btn">Send Message</button>
        </form>
        <div id="form-success" style="display:none;text-align:center;padding:3rem 0;">
          <h3 style="font-size:1.4rem;font-weight:700;margin-bottom:0.75rem;">Thank you for reaching out.</h3>
          <p style="color:#555;font-size:1rem;line-height:1.7;">We will follow up within two business days.</p>
          <a href="/" style="display:inline-block;margin-top:1.5rem;color:#2563eb;font-weight:500;">Back to Home</a>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">

  </footer>

  <script>
    // Pre-select service from query parameter
    (function() {
      var params = new URLSearchParams(window.location.search);
      var service = params.get('service');
      if (service) {
        var map = {
          'procedural': 'Cadaver-Based Procedural Courses',
          'elearning': 'eLearning and Content Development',
          'sme': 'Curriculum Review and SME Auditing',
          'workshops': 'Live Workshops and Sales Meetings',
          'retainer': 'Consulting Retainer and Advisory'
        };
        var value = map[service];
        if (value) {
          var select = document.getElementById('interest');
          for (var i = 0; i < select.options.length; i++) {
            if (select.options[i].value === value) {
              select.selectedIndex = i;
              break;
            }
          }
        }
      }
    })();

    document.getElementById('contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var form = this;
      var btn = form.querySelector('.submit-btn');
      btn.textContent = 'Sending...';
      btn.disabled = true;
      fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        body: new FormData(form),
        headers: { 'Accept': 'application/json' }
      }).then(function(response) {
        if (response.ok) {
          form.style.display = 'none';
          document.getElementById('form-success').style.display = 'block';
          form.reset();
        } else {
          btn.textContent = 'Send Message';
          btn.disabled = false;
          alert('Something went wrong. Please try again or email us directly.');
        }
      }).catch(function() {
        btn.textContent = 'Send Message';
        btn.disabled = false;
        alert('Something went wrong. Please try again or email us directly.');
      });
    });
  </script>
